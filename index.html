<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickNote 客戶備忘錄</title>
    <style>
        :root {
            color-scheme: light;
            --page: #f4eadb;
            --panel: rgba(255, 253, 249, 0.94);
            --panel-strong: #fffdfa;
            --muted: #f4ece0;
            --text: #2d241e;
            --text-soft: #6b5a4e;
            --primary: #a24d24;
            --primary-dark: #783617;
            --secondary: #2f766f;
            --secondary-soft: #dcece7;
            --danger: #a73535;
            --danger-soft: #f8d8d8;
            --warning-soft: #f7dfdd;
            --border: rgba(92, 70, 55, 0.18);
            --shadow: 0 24px 54px rgba(86, 56, 34, 0.12);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --space-1: 0.5rem;
            --space-2: 0.75rem;
            --space-3: 1rem;
            --space-4: 1.25rem;
            --space-5: 1.5rem;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 216, 172, 0.88), transparent 34%),
                radial-gradient(circle at top right, rgba(179, 223, 209, 0.72), transparent 34%),
                linear-gradient(180deg, #fbf1e5 0%, var(--page) 100%);
            padding: clamp(0.75rem, 2vw, 1.5rem);
        }

        button, input, select, textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        [v-cloak] {
            display: none;
        }

        .shell {
            width: min(1060px, 100%);
            margin: 0 auto;
            display: grid;
            gap: var(--space-3);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            padding: clamp(1rem, 2.4vw, 1.55rem);
            display: grid;
            gap: var(--space-4);
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-4);
        }

        h1, h2, h3, p {
            margin: 0;
        }

        h1 {
            font-size: clamp(1.55rem, 4vw, 2rem);
            line-height: 1.2;
        }

        .results-meta, .hint, .record-title small {
            color: var(--text-soft);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .toolbar-group, .toolbar-side, .record-actions, .record-meta {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .toolbar-side {
            justify-content: flex-end;
        }

        .button, .ghost-button, .danger-button, .icon-button {
            min-height: 44px;
            border: 0;
            border-radius: 999px;
            padding: 0.75rem 1.15rem;
            font-weight: 700;
            color: var(--text);
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .button {
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 14px 28px rgba(120, 54, 23, 0.18);
        }

        .ghost-button {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(91, 70, 55, 0.16);
        }

        .danger-button {
            color: var(--danger);
            background: var(--danger-soft);
        }

        .icon-button {
            width: 52px;
            min-width: 52px;
            padding: 0;
            color: var(--secondary);
            background: rgba(47, 118, 111, 0.12);
            display: inline-grid;
            place-items: center;
        }

        .button:hover, .ghost-button:hover, .danger-button:hover, .icon-button:hover {
            transform: translateY(-1px);
        }

        .button:focus-visible, .ghost-button:focus-visible, .danger-button:focus-visible, .icon-button:focus-visible,
        input:focus, select:focus, textarea:focus {
            outline: 3px solid rgba(47, 118, 111, 0.22);
            outline-offset: 2px;
        }

        .icon-button svg {
            width: 1.2rem;
            height: 1.2rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .status-pill {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 0.72rem 1rem;
            color: var(--secondary);
            background: var(--secondary-soft);
            font-weight: 700;
        }

        .status-pill.warn {
            color: #9a3838;
            background: var(--warning-soft);
        }

        .status-pill.error {
            color: var(--danger);
            background: var(--danger-soft);
        }

        .search-input, .field input, .field select, .field textarea, .settings-edit-form input {
            width: 100%;
            min-height: 3rem;
            border: 1px solid rgba(92, 70, 55, 0.16);
            border-radius: var(--radius-md);
            background: var(--panel-strong);
            color: var(--text);
            padding: 0.85rem 1rem;
        }

        .date-input-wrap {
            position: relative;
        }

        .date-input-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            width: 1.1rem;
            height: 1.1rem;
            transform: translateY(-50%);
            color: var(--text-soft);
            stroke: currentColor;
            fill: none;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .field .date-input {
            cursor: pointer;
            padding-right: 3rem;
        }

        .vc-container {
            --vc-font-family: "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
            --vc-accent-50: #f8eee8;
            --vc-accent-100: #f1dfd3;
            --vc-accent-200: #e7c4ae;
            --vc-accent-300: #dba381;
            --vc-accent-400: #c67848;
            --vc-accent-500: var(--primary);
            --vc-accent-600: var(--primary-dark);
            --vc-accent-700: #612a11;
            border-color: rgba(92, 70, 55, 0.16);
            border-radius: var(--radius-lg);
            box-shadow: 0 18px 42px rgba(86, 56, 34, 0.16);
        }

        .vc-popover-content {
            border-radius: var(--radius-lg);
        }

        .search-input {
            min-height: 3.35rem;
        }

        textarea {
            resize: vertical;
            min-height: 7rem;
        }

        .records-grid {
            display: grid;
            gap: var(--space-3);
        }

        .record-card, .empty-state {
            border: 1px solid rgba(162, 77, 36, 0.16);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 250, 244, 0.94));
        }

        .record-card {
            display: grid;
            gap: var(--space-3);
            padding: var(--space-4);
        }

        .record-card.editing {
            border-color: rgba(47, 118, 111, 0.3);
            background: linear-gradient(180deg, rgba(250, 255, 253, 0.96), rgba(244, 252, 249, 0.94));
        }

        .record-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .record-title {
            display: grid;
            gap: 0.35rem;
        }

        .record-item, .record-note {
            border-radius: var(--radius-md);
            padding: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
        }

        .record-item {
            background: rgba(162, 77, 36, 0.08);
            font-weight: 700;
        }

        .record-note {
            background: var(--muted);
            color: var(--text-soft);
        }

        .pill {
            min-height: 36px;
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 0.38rem 0.8rem;
            color: var(--secondary);
            background: var(--secondary-soft);
            font-weight: 700;
        }

        .pill.muted {
            color: var(--text-soft);
            background: rgba(91, 70, 55, 0.1);
        }

        .empty-state {
            text-align: center;
            display: grid;
            gap: var(--space-2);
            padding: clamp(2.5rem, 7vw, 4.2rem) var(--space-4);
            border-style: dashed;
        }

        .editor-form {
            display: grid;
            gap: var(--space-3);
        }

        .form-grid {
            display: grid;
            gap: var(--space-3);
        }

        .form-grid.two {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .field {
            display: grid;
            gap: 0.45rem;
        }

        .field label, .field legend {
            font-weight: 700;
        }

        .required-mark {
            color: var(--danger);
            margin-left: 0.2rem;
        }

        fieldset.field {
            border: 0;
            padding: 0;
            margin: 0;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
        }

        .checkbox-chip {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(162, 77, 36, 0.16);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            padding: 0.68rem 0.9rem;
        }

        .checkbox-chip input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--secondary);
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: var(--space-3);
            background: rgba(42, 29, 20, 0.42);
            z-index: 10;
        }

        .modal {
            width: min(720px, 100%);
            max-height: min(820px, 92vh);
            overflow: auto;
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            padding: var(--space-5);
            display: grid;
            gap: var(--space-4);
        }

        .settings-section {
            display: grid;
            gap: var(--space-3);
        }

        .settings-actions, .settings-list {
            display: grid;
            gap: var(--space-2);
        }

        .settings-actions {
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-2);
            border: 1px solid rgba(92, 70, 55, 0.12);
            border-radius: var(--radius-md);
            background: rgba(247, 241, 234, 0.7);
            padding: 0.75rem 0.9rem;
        }

        .settings-item-actions {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .settings-edit-form {
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--space-2);
            align-items: center;
        }

        .inline-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--space-2);
            align-items: end;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
        }

        @media (max-width: 760px) {
            body {
                padding: var(--space-2);
            }

            .panel-header, .toolbar, .toolbar-side, .record-top, .settings-item {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-group, .toolbar-side, .record-actions, .settings-item-actions {
                width: 100%;
            }

            .toolbar-group button, .toolbar-side button, .record-actions button, .settings-actions button,
            .inline-form button, .settings-item-actions button {
                width: 100%;
            }

            .status-pill {
                width: 100%;
            }

            .form-grid.two, .inline-form, .settings-edit-form {
                grid-template-columns: 1fr;
            }

            .record-card, .panel, .modal {
                padding: var(--space-3);
            }
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <main class="shell">
            <section class="panel" aria-labelledby="recordsTitle">
                <div class="panel-header">
                    <div>
                        <h1 id="recordsTitle">紀錄列表</h1>
                    </div>
                    <div class="results-meta">{{ resultsMeta }}</div>
                </div>

                <div class="toolbar">
                    <div class="toolbar-group">
                        <button class="button" type="button" @click="startCreate">新增紀錄</button>
                        <button class="ghost-button" type="button" @click="clearSearch">清除搜尋</button>
                    </div>
                    <div class="toolbar-side">
                        <button class="icon-button" type="button" aria-label="設定" @click="openSettings">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="3.2"></circle>
                                <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 1 1-4 0v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 1 1 0-4h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a2 2 0 1 1 4 0v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.2a2 2 0 1 1 0 4h-.2a1 1 0 0 0-.9.6z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <label class="visually-hidden" for="searchInput">搜尋</label>
                <input id="searchInput" class="search-input" v-model.trim="searchQuery" type="search" autocomplete="off" placeholder="搜尋客戶名、日期、貨品、行政區、送貨方式或備註">

                <div class="records-grid">
                    <article v-if="isCreating" class="record-card editing">
                        <record-editor
                            :form="editorForm"
                            :city-options="cityOptions"
                            :district-options="districtOptions"
                            :shipping-options="state.shippingOptions"
                            mode="create"
                            @save="submitEditor"
                            @cancel="cancelEditor"
                        ></record-editor>
                    </article>

                    <article v-for="record in filteredRecords" :key="record.id" class="record-card" :class="{ editing: editingId === record.id }">
                        <record-editor
                            v-if="editingId === record.id"
                            :form="editorForm"
                            :city-options="cityOptions"
                            :district-options="districtOptions"
                            :shipping-options="state.shippingOptions"
                            mode="edit"
                            @save="submitEditor"
                            @cancel="cancelEditor"
                            @delete="deleteRecord(record.id)"
                        ></record-editor>

                        <template v-else>
                            <div class="record-top">
                                <div class="record-title">
                                    <h3>{{ record.name }}</h3>
                                    <small>{{ record.city }}{{ record.district }}</small>
                                </div>
                                <div class="record-actions">
                                    <button class="ghost-button" type="button" @click="startEdit(record)">編輯</button>
                                    <button class="danger-button" type="button" @click="deleteRecord(record.id)">刪除</button>
                                </div>
                            </div>
                            <div class="record-meta">
                                <span class="pill muted">出貨：{{ record.deliveryDate ? formatDeliveryDate(record.deliveryDate) : '未設定日期' }}</span>
                                <span v-if="!record.shipping.length" class="pill muted">未選擇送貨方式</span>
                                <span v-for="item in record.shipping" :key="item" class="pill">{{ item }}</span>
                            </div>
                            <div class="record-item">{{ record.item || '尚未填寫貨品內容' }}</div>
                            <div class="record-note">{{ record.note || '尚未填寫備註' }}</div>
                            <div class="record-meta">
                                <span class="pill muted">建立：{{ formatDateTime(record.createdAt) }}</span>
                                <span v-if="hasUpdated(record)" class="pill muted">更新：{{ formatDateTime(record.updatedAt) }}</span>
                            </div>
                        </template>
                    </article>

                    <div v-if="!isCreating && !filteredRecords.length" class="empty-state">
                        <h3>{{ state.records.length ? '找不到符合條件的資料' : '還沒有客戶資料' }}</h3>
                        <p>{{ state.records.length ? '可以換個關鍵字，或直接按新增紀錄插入一張新的空白卡片。' : '先按新增紀錄，列表最上方就會出現一張可直接輸入的空白卡片。' }}</p>
                    </div>
                </div>
            </section>
        </main>

        <div v-if="showSettings" class="overlay" role="presentation" @click.self="closeSettings">
            <section class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
                <div class="panel-header">
                    <div>
                        <h2 id="settingsTitle">設定</h2>
                    </div>
                    <button class="ghost-button" type="button" @click="closeSettings">關閉</button>
                </div>

                <section class="settings-section" aria-labelledby="dataActionsTitle">
                    <div>
                        <h3 id="dataActionsTitle">資料操作</h3>
                    </div>
                    <div class="settings-actions">
                        <button class="ghost-button" type="button" @click="openDataFile">開啟 JSON</button>
                        <button class="button" type="button" @click="manualSave">儲存 JSON</button>
                        <button class="ghost-button" type="button" @click="exportJsonFile">下載副本</button>
                        <button class="danger-button" type="button" @click="clearAllRecords">清空全部紀錄</button>
                    </div>
                </section>

                <section class="settings-section" aria-labelledby="shippingSettingsTitle">
                    <div>
                        <h3 id="shippingSettingsTitle">送貨方式設定</h3>
                    </div>
                    <form class="inline-form" @submit.prevent="addShippingOption">
                        <div class="field">
                            <label for="shippingOptionInput">新增送貨方式</label>
                            <input id="shippingOptionInput" v-model.trim="newShippingOption" autocomplete="off" placeholder="例如：黑貓宅配">
                        </div>
                        <button class="button" type="submit">新增選項</button>
                    </form>
                    <div class="settings-list">
                        <div v-if="!state.shippingOptions.length" class="empty-state">
                            <h3>尚無送貨方式</h3>
                        </div>
                        <div v-for="option in state.shippingOptions" :key="option" class="settings-item">
                            <form v-if="editingShippingOption === option" class="settings-edit-form" @submit.prevent="saveShippingOptionRename(option)">
                                <input data-shipping-edit-input v-model.trim="shippingOptionDraft" autocomplete="off" aria-label="修改送貨方式名稱">
                                <div class="settings-item-actions">
                                    <button class="button" type="submit">儲存</button>
                                    <button class="ghost-button" type="button" @click="cancelShippingOptionRename">取消</button>
                                </div>
                            </form>
                            <template v-else>
                                <strong>{{ option }}</strong>
                                <div class="settings-item-actions">
                                    <button class="ghost-button" type="button" @click="startRenameShippingOption(option)">改名</button>
                                    <button class="danger-button" type="button" @click="deleteShippingOption(option)">刪除</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </section>
            </section>
        </div>

        <input ref="importInput" type="file" accept="application/json,.json" hidden @change="importJsonFile">
    </div>

    <template id="record-editor-template">
        <form class="editor-form" @submit.prevent="$emit('save')">
            <div class="record-top">
                <div class="record-title">
                    <h3>{{ mode === 'create' ? '新增紀錄' : '編輯紀錄' }}</h3>
                    <small>{{ mode === 'create' ? '這張空白卡片就是新的輸入區塊。' : '直接在原本位置修改。' }}</small>
                </div>
                <div class="record-actions">
                    <button class="button" type="submit">{{ mode === 'create' ? '儲存新增' : '儲存修改' }}</button>
                    <button class="ghost-button" type="button" @click="$emit('cancel')">取消</button>
                    <button v-if="mode === 'edit'" class="danger-button" type="button" @click="$emit('delete')">刪除</button>
                </div>
            </div>

            <div class="form-grid two">
                <div class="field">
                    <label>客戶名<span class="required-mark" aria-hidden="true">*</span></label>
                    <input data-editor-autofocus v-model.trim="form.name" autocomplete="off" placeholder="例如：王小姐" required aria-required="true">
                </div>
                <div class="field">
                    <label>出貨日期</label>
                    <v-date-picker
                        v-model.string="form.deliveryDate"
                        :masks="{ input: 'YYYY / MM / DD', modelValue: 'YYYY-MM-DD' }"
                        :popover="{ visibility: 'click', placement: 'bottom-start' }"
                    >
                        <template #default="{ inputValue, inputEvents }">
                            <div class="date-input-wrap">
                                <input class="date-input" :value="inputValue" v-on="inputEvents" readonly placeholder="請選擇出貨日期">
                                <svg class="date-input-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M8 2v4"></path>
                                    <path d="M16 2v4"></path>
                                    <path d="M3.5 9h17"></path>
                                    <rect x="4" y="5" width="16" height="16" rx="2"></rect>
                                </svg>
                            </div>
                        </template>
                    </v-date-picker>
                </div>
            </div>

            <div class="field">
                <label>貨品內容</label>
                <textarea v-model.trim="form.item" placeholder="例如：禮盒 2 組、常溫一箱"></textarea>
            </div>

            <div class="form-grid two">
                <div class="field">
                    <label>縣市</label>
                    <select v-model="form.city">
                        <option value="">請選擇縣市</option>
                        <option v-for="city in cityOptions" :key="city" :value="city">{{ city }}</option>
                    </select>
                </div>
                <div class="field">
                    <label>行政區</label>
                    <select v-model="form.district" :disabled="!districtOptions.length">
                        <option value="">{{ districtOptions.length ? '請選擇行政區' : '請先選擇縣市' }}</option>
                        <option v-for="district in districtOptions" :key="district" :value="district">{{ district }}</option>

        const DEFAULT_SHIPPING_OPTIONS = ["自送", "自取", "華誠(小)", "華誠(中)", "華誠(大)", "D.Y.", "D", "東宜", "大粲"];
        const STORAGE_KEY = "quicknote-state-v2";
        const LEGACY_STORAGE_KEY = "quicknote-state-v1";
        const HANDLE_DB_NAME = "quicknote-file-handles";
        const HANDLE_STORE_NAME = "handles";
        const HANDLE_KEY = "primary-data-file";

        const { createApp, reactive, ref, computed, watch, nextTick } = Vue;

        function createDefaultState() {
            return { shippingOptions: [...DEFAULT_SHIPPING_OPTIONS], records: [] };
        }

        function uniqueTrimmedList(values, fallback = []) {
            const source = Array.isArray(values) ? values : fallback;
            return [...new Set(source.map((item) => String(item ?? "").trim()).filter(Boolean))];
        }

        function normalizeDateValue(value) {
            return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value.trim()) ? value.trim() : "";
        }

        function isValidDate(value) {
            return !Number.isNaN(new Date(value).getTime());
        }

        function createId() {
            return window.crypto && typeof window.crypto.randomUUID === "function"
                ? window.crypto.randomUUID()
                : `id-${Date.now()}-${Math.random().toString(36).slice(2)}`;
        }

        function normalizeRecord(record) {
            if (!record || typeof record !== "object") return null;
            const name = String(record.name ?? "").trim();
            const city = String(record.city ?? "").trim();
            const district = String(record.district ?? "").trim();
            if (!name) return null;
            const createdAt = isValidDate(record.createdAt) ? record.createdAt : new Date().toISOString();
            const updatedAt = record.updatedAt && isValidDate(record.updatedAt) ? record.updatedAt : createdAt;
            return {
                id: String(record.id ?? createId()),
                name,
                deliveryDate: normalizeDateValue(record.deliveryDate),
                item: String(record.item ?? "").trim(),
                city,
                district,
                shipping: uniqueTrimmedList(record.shipping),
                note: String(record.note ?? "").trim(),
                createdAt,
                updatedAt
            };
        }

        function normalizeState(raw) {
            const next = createDefaultState();
            next.shippingOptions = uniqueTrimmedList(raw?.shippingOptions, DEFAULT_SHIPPING_OPTIONS);
            next.records = Array.isArray(raw?.records)
                ? raw.records.map(normalizeRecord).filter(Boolean).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
                : [];
            return next;
        }

        function loadInitialState() {
            try {
                const cached = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
                return cached ? normalizeState(JSON.parse(cached)) : createDefaultState();
            } catch {
                return createDefaultState();
            }
        }

        function supportsFileSystemAccess() {
            return typeof window.showOpenFilePicker === "function" && typeof window.showSaveFilePicker === "function";
        }

        function formatDateTime(value) {
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? "時間格式錯誤" : new Intl.DateTimeFormat("zh-TW", {
                year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
            }).format(date);
        }

        function formatDeliveryDate(value) {
            if (!value) return "";
            const date = new Date(`${value}T00:00:00`);
            return Number.isNaN(date.getTime()) ? value : new Intl.DateTimeFormat("zh-TW", {
                year: "numeric", month: "2-digit", day: "2-digit"
            }).format(date);
        }

        function hasUpdated(record) {
            return Boolean(record?.updatedAt) && record.updatedAt !== record.createdAt;
        }

        async function verifyFilePermission(handle, writable) {
            const options = writable ? { mode: "readwrite" } : {};
            if (typeof handle.queryPermission === "function" && await handle.queryPermission(options) === "granted") return true;
            if (typeof handle.requestPermission === "function") return await handle.requestPermission(options) === "granted";
            return true;
        }

        async function writeToDataFile(handle, state) {
            const writable = await handle.createWritable();
            await writable.write(JSON.stringify({ shippingOptions: state.shippingOptions, records: state.records }, null, 2));
            await writable.close();
        }

        async function readDataFile(handle) {
            const file = await handle.getFile();
            const text = await file.text();
            return text.trim() ? JSON.parse(text) : createDefaultState();
        }

        function openDb() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(HANDLE_DB_NAME, 1);
                request.addEventListener("upgradeneeded", () => request.result.createObjectStore(HANDLE_STORE_NAME));
                request.addEventListener("success", () => resolve(request.result));
                request.addEventListener("error", () => reject(request.error));
            });
        }

        async function storeFileHandle(handle) {
            const db = await openDb();
            await new Promise((resolve, reject) => {
                const transaction = db.transaction(HANDLE_STORE_NAME, "readwrite");
                transaction.objectStore(HANDLE_STORE_NAME).put(handle, HANDLE_KEY);
                transaction.addEventListener("complete", resolve);
                transaction.addEventListener("error", () => reject(transaction.error));
            });
            db.close();
        }

        async function getStoredFileHandle() {
            try {
                const db = await openDb();
                const handle = await new Promise((resolve, reject) => {
                    const transaction = db.transaction(HANDLE_STORE_NAME, "readonly");
                    const request = transaction.objectStore(HANDLE_STORE_NAME).get(HANDLE_KEY);
                    request.addEventListener("success", () => resolve(request.result ?? null));
                    request.addEventListener("error", () => reject(request.error));
                });
                db.close();
                return handle;
            } catch {
                return null;
            }
        }

        const app = createApp({
            setup() {
                const state = reactive(loadInitialState());
                const fileHandle = ref(null);
                const searchQuery = ref("");
                const showSettings = ref(false);
                const newShippingOption = ref("");
                const editingShippingOption = ref("");
                const shippingOptionDraft = ref("");
                const importInput = ref(null);
                const editingId = ref(null);
                const isCreating = ref(false);
                const statusMessage = ref("");
                const statusTone = ref("");
                const editorForm = reactive(createEmptyForm());
                const editorSnapshot = ref("");
                const cityOptions = Object.keys(DISTRICTS);

                const districtOptions = computed(() => editorForm.city ? DISTRICTS[editorForm.city] ?? [] : []);
                const filteredRecords = computed(() => {
                    const query = searchQuery.value.trim().toLowerCase();
                    if (!query) return [...state.records];
                    return state.records.filter((record) => [
                        record.name,
                        record.deliveryDate,
                        formatDeliveryDate(record.deliveryDate),
                        record.item,
                        `${record.city}${record.district}`,
                        `${record.city} ${record.district}`,
                        record.shipping.join(" "),
                        record.note
                    ].join("\n").toLowerCase().includes(query));
                });
                const resultsMeta = computed(() => {
                    if (!state.records.length) return "尚未建立任何紀錄";
                    if (!filteredRecords.value.length) return `搜尋不到符合條件的資料，目前總共有 ${state.records.length} 筆紀錄`;
                    return `共顯示 ${filteredRecords.value.length} / ${state.records.length} 筆紀錄`;
                });

                watch(() => editorForm.city, (city) => {
                    if (!city || !(DISTRICTS[city] ?? []).includes(editorForm.district)) editorForm.district = "";
                });

                function createEmptyForm() {
                    return { name: "", deliveryDate: "", item: "", city: "", district: "", shipping: [], note: "" };
                }

                function setStatus(message, tone = "") {
                    statusMessage.value = message;
                    statusTone.value = tone;
                }

                function formSnapshot() {
                    return JSON.stringify({ ...editorForm, shipping: [...editorForm.shipping].sort() });
                }

                function fillEditor(record = null) {
                    Object.assign(editorForm, createEmptyForm(), record ? {
                        name: record.name,
                        deliveryDate: record.deliveryDate,
                        item: record.item,
                        city: record.city,
                        district: record.district,
                        shipping: [...record.shipping],
                        note: record.note
                    } : {});
                    editorSnapshot.value = formSnapshot();
                }

                function discardEditor(force = false) {
                    if (!force && (isCreating.value || editingId.value) && formSnapshot() !== editorSnapshot.value) {
                        if (!confirm("目前有尚未儲存的內容，確定要放棄嗎？")) return false;
                    }
                    isCreating.value = false;
                    editingId.value = null;
                    fillEditor(null);
                    editorSnapshot.value = "";
                    return true;
                }

                function focusEditor() {
                    nextTick(() => document.querySelector("[data-editor-autofocus]")?.focus());
                }

                function startCreate() {
                    if (!discardEditor()) return;
                    fillEditor(null);
                    isCreating.value = true;
                    focusEditor();
                }

                function startEdit(record) {
                    if (!discardEditor()) return;
                    fillEditor(record);
                    editingId.value = record.id;
                    focusEditor();
                }

                function cancelEditor() {
                    discardEditor();
                }

                function validateEditor() {
                    if (!editorForm.name.trim()) return alert("請先填寫客戶名。"), false;
                    return true;
                }

                function sortRecords() {
                    state.records.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
                }

                function persistLocalState() {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ shippingOptions: state.shippingOptions, records: state.records }));
                }

                async function persistAfterChange(message) {
                    persistLocalState();
                    if (!fileHandle.value || !supportsFileSystemAccess()) {
                        setStatus(`${message}，已存在瀏覽器暫存。`, "warn");
                        return;
                    }
                    try {
                        const granted = await verifyFilePermission(fileHandle.value, true);
                        if (!granted) return setStatus(`${message}，桌面檔案尚未授權寫入。`, "warn");
                        await writeToDataFile(fileHandle.value, state);
                        setStatus(`${message}，已儲存 JSON。`);
                    } catch (error) {
                        console.error(error);
                        setStatus(`${message}，但儲存 JSON 失敗。`, "error");
                    }
                }

                async function submitEditor() {
                    if (!validateEditor()) return;
                    const now = new Date().toISOString();
                    const payload = {
                        name: editorForm.name.trim(),
                        deliveryDate: editorForm.deliveryDate,
                        item: editorForm.item.trim(),
                        city: editorForm.city,
                        district: editorForm.district,
                        shipping: uniqueTrimmedList(editorForm.shipping),
                        note: editorForm.note.trim()
                    };
                    if (editingId.value) {
                        const index = state.records.findIndex((record) => record.id === editingId.value);
                        if (index !== -1) state.records[index] = { ...state.records[index], ...payload, updatedAt: now };
                        sortRecords();
                        discardEditor(true);
                        await persistAfterChange("已更新紀錄");
                        return;
                    }
                    state.records.unshift({ id: createId(), ...payload, createdAt: now, updatedAt: now });
                    sortRecords();
                    discardEditor(true);
                    await persistAfterChange("已新增紀錄");
                }

                async function deleteRecord(id) {
                    const record = state.records.find((item) => item.id === id);
                    if (!record || !confirm(`確定要刪除「${record.name}」這筆紀錄嗎？`)) return;
                    state.records = state.records.filter((item) => item.id !== id);
                    if (editingId.value === id) discardEditor(true);
                    await persistAfterChange("已刪除紀錄");
                }

                async function clearAllRecords() {
                    if (!state.records.length || !confirm("確定要清空全部紀錄嗎？")) return;
                    state.records = [];
                    discardEditor(true);
                    closeSettings();
                    await persistAfterChange("已清空全部紀錄");
                }

                function clearSearch() {
                    searchQuery.value = "";
                }

                function openSettings() {
                    showSettings.value = true;
                }

                function closeSettings() {
                    showSettings.value = false;
                }

                async function addShippingOption() {
                    const value = newShippingOption.value.trim();
                    if (!value) return;
                    if (state.shippingOptions.includes(value)) return alert("這個送貨方式已經存在。");
                    state.shippingOptions.push(value);
                    state.shippingOptions.sort((a, b) => a.localeCompare(b, "zh-Hant"));
                    newShippingOption.value = "";
                    await persistAfterChange("已新增送貨方式");
                }

                function startRenameShippingOption(option) {
                    editingShippingOption.value = option;
                    shippingOptionDraft.value = option;
                    nextTick(() => document.querySelector("[data-shipping-edit-input]")?.focus());
                }

                function cancelShippingOptionRename() {
                    editingShippingOption.value = "";
                    shippingOptionDraft.value = "";
                }

                async function saveShippingOptionRename(option) {
                    const value = shippingOptionDraft.value.trim();
                    if (!value) return alert("請先填寫送貨方式名稱。");
                    if (value === option) return cancelShippingOptionRename();
                    if (state.shippingOptions.includes(value)) return alert("這個送貨方式已經存在。");
                    state.shippingOptions = state.shippingOptions.map((item) => item === option ? value : item).sort((a, b) => a.localeCompare(b, "zh-Hant"));
                    state.records = state.records.map((record) => record.shipping.includes(option)
                        ? { ...record, shipping: record.shipping.map((item) => item === option ? value : item), updatedAt: new Date().toISOString() }
                        : record);
                    editorForm.shipping = editorForm.shipping.map((item) => item === option ? value : item);
                    cancelShippingOptionRename();
                    sortRecords();
                    await persistAfterChange("已修改送貨方式");
                }

                async function deleteShippingOption(option) {
                    const isUsed = state.records.some((record) => record.shipping.includes(option));
                    const message = isUsed ? `「${option}」已被既有紀錄使用，刪除後會一併移除。確定刪除嗎？` : `確定要刪除「${option}」嗎？`;
                    if (!confirm(message)) return;
                    state.shippingOptions = state.shippingOptions.filter((item) => item !== option);
                    state.records = state.records.map((record) => record.shipping.includes(option)
                        ? { ...record, shipping: record.shipping.filter((item) => item !== option), updatedAt: new Date().toISOString() }
                        : record);
                    editorForm.shipping = editorForm.shipping.filter((item) => item !== option);
                    if (editingShippingOption.value === option) cancelShippingOptionRename();
                    sortRecords();
                    await persistAfterChange("已刪除送貨方式");
                }

                async function manualSave() {
                    if (!supportsFileSystemAccess()) return exportJsonFile();
                    if (!fileHandle.value) return saveAsDataFile();
                    await writeToDataFile(fileHandle.value, state);
                    setStatus("已儲存 JSON。");
                }

                async function openDataFile() {
                    if (!supportsFileSystemAccess()) return alert("目前瀏覽器不支援直接開啟 JSON，請改用下載副本備份資料。");
                    if (!discardEditor()) return;
                    try {
                        const [handle] = await window.showOpenFilePicker({ multiple: false, types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
                        if (!await verifyFilePermission(handle, false)) return setStatus("未取得 JSON 讀取權限。", "warn");
                        const next = normalizeState(await readDataFile(handle));
                        state.shippingOptions = next.shippingOptions;
                        state.records = next.records;
                        fileHandle.value = handle;
                        await storeFileHandle(handle);
                        persistLocalState();
                        setStatus("已載入 JSON。");
                    } catch (error) {
                        if (error?.name !== "AbortError") setStatus("開啟 JSON 失敗。", "error");
                    }
                }

                async function saveAsDataFile() {
                    if (!supportsFileSystemAccess()) return exportJsonFile();
                    try {
                        const handle = await window.showSaveFilePicker({ suggestedName: "quicknote-data.json", types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
                        if (!await verifyFilePermission(handle, true)) return setStatus("未取得 JSON 寫入權限。", "warn");
                        fileHandle.value = handle;
                        await storeFileHandle(handle);
                        await writeToDataFile(handle, state);
                        setStatus("已儲存 JSON。");
                    } catch (error) {
                        if (error?.name !== "AbortError") setStatus("儲存 JSON 失敗。", "error");
                    }
                }

                function exportJsonFile() {
                    const blob = new Blob([JSON.stringify({ shippingOptions: state.shippingOptions, records: state.records }, null, 2)], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = `quicknote-export-${new Date().toISOString().slice(0, 10)}.json`;
                    document.body.append(link);
                    link.click();
                    link.remove();
                    URL.revokeObjectURL(url);
                    setStatus("已下載 JSON 副本。");
                }

                function openImportDialog() {
                    importInput.value?.click();
                }

                async function importJsonFile(event) {
                    const file = event.target.files?.[0];
                    if (!file || !discardEditor()) return;
                    try {
                        const next = normalizeState(JSON.parse(await file.text()));
                        state.shippingOptions = next.shippingOptions;
                        state.records = next.records;
                        persistLocalState();
                        await persistAfterChange("已匯入 JSON");
                    } catch {
                        alert("匯入失敗，請確認 JSON 格式是否正確。");
                    } finally {
                        event.target.value = "";
                    }
                }

                nextTick(async () => {
                    if (!supportsFileSystemAccess()) return;
                    const handle = await getStoredFileHandle();
                    if (!handle || !await verifyFilePermission(handle, false)) return;
                    try {
                        const next = normalizeState(await readDataFile(handle));
                        state.shippingOptions = next.shippingOptions;
                        state.records = next.records;
                        fileHandle.value = handle;
                        persistLocalState();
                    } catch {
                        setStatus("自動讀取上次 JSON 失敗。", "warn");
                    }
                });

                return {
                    state,
                    searchQuery,
                    showSettings,
                    newShippingOption,
                    editingShippingOption,
                    shippingOptionDraft,
                    importInput,
                    editingId,
                    isCreating,
                    statusMessage,
                    statusTone,
                    editorForm,
                    cityOptions,
                    districtOptions,
                    filteredRecords,
                    resultsMeta,
                    startCreate,
                    startEdit,
                    cancelEditor,
                    submitEditor,
                    deleteRecord,
                    clearAllRecords,
                    clearSearch,
                    openSettings,
                    closeSettings,
                    addShippingOption,
                    startRenameShippingOption,
                    cancelShippingOptionRename,
                    saveShippingOptionRename,
                    deleteShippingOption,
                    manualSave,
                    openDataFile,
                    saveAsDataFile,
                    exportJsonFile,
                    openImportDialog,
                    importJsonFile,
                    formatDateTime,
                    formatDeliveryDate,
                    hasUpdated
                };
            }
        });

        app.component("record-editor", {
            template: "#record-editor-template",
            props: {
                form: { type: Object, required: true },
                cityOptions: { type: Array, required: true },
                districtOptions: { type: Array, required: true },
                shippingOptions: { type: Array, required: true },
                mode: { type: String, required: true }
            },
            emits: ["save", "cancel", "delete"]
        });

        app.use(VCalendar.default, { componentPrefix: "V" });

        app.mount("#app");
    </script>
</body>
</html>
